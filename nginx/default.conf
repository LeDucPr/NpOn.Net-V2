upstream generalservice_backend {
    # Docker Compose will automatically add all IPs of the scaled
    # 'generalservice' containers here for load balancing.
    server generalservice:40000;
}

server {
    listen 80;

    location / {
        proxy_pass http://generalservice_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}