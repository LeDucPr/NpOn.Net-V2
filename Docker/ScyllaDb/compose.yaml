#prerun
  # docker volume create scylla_data_node1
  # docker volume create scylla_data_node2
  # docker volume create scylla_data_node3
#tạo ghost container giữ lại  
  # docker run -d --name keep-scylla-node1 -v scylla_data_node1:/data alpine tail -f /dev/null
  # docker run -d --name keep-scylla-node2 -v scylla_data_node2:/data alpine tail -f /dev/null
  # docker run -d --name keep-scylla-node3 -v scylla_data_node3:/data alpine tail -f /dev/null

name: scylla-cluster
services:
  # keep data
  keep-data-node1:
    image: alpine
    container_name: keep-scylla-node1
    command: tail -f /dev/null
    volumes:
      - scylla_data_node1:/data
    restart: always

  keep-data-node2:
    image: alpine
    container_name: keep-scylla-node2
    command: tail -f /dev/null
    volumes:
      - scylla_data_node2:/data
    restart: always

  keep-data-node3:
    image: alpine
    container_name: keep-scylla-node3
    command: tail -f /dev/null
    volumes:
      - scylla_data_node3:/data
    restart: always
      
  # scylladb
  scylla-node1:
    container_name: scylla-node1
    hostname: scylla-node1
    image: scylladb/scylla:latest
    restart: unless-stopped
    command: --developer-mode 1 --smp 1 --seeds scylla-node1 --api-address 0.0.0.0
    volumes:
      - scylla_data_node1:/var/lib/scylla
      - ./config/node1/scylla.yaml:/etc/scylla/scylla.yaml
      - ./config/node1/cassandra-rackdc.properties:/etc/scylla/cassandra-rackdc.properties
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 7000:7000   # Gossip
      - 7001:7001   # Gossip SSL
      - 9042:9042   # CQL
      - 9180:9180   # Metrics
      - 9100:9100   # Node exporter
      - 9160:9160   # Thrift
      - 7199:7199   # JMX
      - 10000:10000 # rest api
    networks:
      vnet:

  scylla-node2:
    container_name: scylla-node2
    hostname: scylla-node2
    image: scylladb/scylla:latest
    restart: unless-stopped
    command: --developer-mode 1 --smp 1 --seeds scylla-node1 --api-address 0.0.0.0
    volumes:
      - scylla_data_node2:/var/lib/scylla
      - ./config/node2/scylla.yaml:/etc/scylla/scylla.yaml
      - ./config/node2/cassandra-rackdc.properties:/etc/scylla/cassandra-rackdc.properties
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 7002:7000   # Gossip
      - 7003:7001   # Gossip SSL
      - 9043:9042
      - 9181:9180
      - 9101:9100
      - 9161:9160
      - 7200:7199
    depends_on:
      - scylla-node1
    networks:
      vnet:

  scylla-node3:
    container_name: scylla-node3
    hostname: scylla-node3
    image: scylladb/scylla:latest
    restart: unless-stopped
    command: --developer-mode 1 --smp 1 --seeds scylla-node1 --api-address 0.0.0.0
    volumes:
      - scylla_data_node3:/var/lib/scylla
      - ./config/node3/scylla.yaml:/etc/scylla/scylla.yaml
      - ./config/node3/cassandra-rackdc.properties:/etc/scylla/cassandra-rackdc.properties
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 7004:7000   # Gossip
      - 7005:7001   # Gossip SSL
      - 9044:9042
      - 9182:9180
      - 9102:9100
      - 9162:9160
      - 7201:7199
    depends_on:
      - scylla-node1
      - scylla-node2
    networks:
      vnet:

networks:
  vnet:
    driver: bridge

volumes:
  scylla_data_node1:
    external: true
  scylla_data_node2:
    external: true
  scylla_data_node3:
    external: true
